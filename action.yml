name: "attest verify"
description: >-
  Gate a commit range against an .attest.json policy; fail on any violation.
  Installs a prebuilt attest, no Swift needed.
author: "CorvidLabs"

branding:
  icon: "shield"
  color: "purple"

inputs:
  range:
    description: "Git range to verify, e.g. 'origin/main..HEAD'. Requires full history (checkout with fetch-depth: 0)."
    required: false
    default: "origin/main..HEAD"
  policy:
    description: "Path to the policy file, relative to working-directory."
    required: false
    default: ".attest.json"
  forward-from:
    description: >-
      Optional reviewed source commit whose provenance should be forwarded to
      the landed commit before verification.
    required: false
    default: ""
  forward-to:
    description: "Landed commit to attest when forward-from is set."
    required: false
    default: "HEAD"
  forward-reviewer:
    description: "Reviewer identity to record on the forwarded attestation."
    required: false
    default: "ci:attest-forward"
  forward-sign:
    description: "Whether to sign the forwarded attestation with the runner's attest key."
    required: false
    default: "false"
  working-directory:
    description: "Directory to run attest in (the repository to verify)."
    required: false
    default: "."
  version:
    description: >-
      attest release to install (e.g. 0.3.0 or v0.3.0), or "latest". Defaults to the
      ref this action was pinned to when that is a release tag, otherwise "latest".
    required: false
    default: ""

outputs:
  binary:
    description: "Absolute path to the attest binary used."
    value: ${{ steps.install.outputs.binary }}

runs:
  using: "composite"
  steps:
    - name: Install attest
      id: install
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.version }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_PATH: ${{ github.action_path }}
        ACTION_REPO: ${{ github.action_repository }}
      run: |
        set -euo pipefail

        repo="${ACTION_REPO:-CorvidLabs/attest}"

        # Resolve which release to install, WITHOUT ever crossing a major
        # boundary. An explicit `version` wins; otherwise derive from the ref the
        # action was pinned to:
        #   @0.3.0 / @v0.3.0 -> install exactly that release
        #   @1 / @v1          -> newest 1.* release (the moving major tag has no
        #                        release of its own, so resolve it to a concrete
        #                        1.* tag; a future 2 `latest` can never leak in)
        #   branch / sha      -> install the latest release
        # A requested tag with no matching asset does NOT silently fall back to a
        # different version; `bin` stays empty and we build from source below.
        ver="${INPUT_VERSION:-}"
        mode="latest"   # latest | tag | none
        target=""       # concrete release tag when mode=tag
        if [ -n "$ver" ]; then
          if [ "$ver" = "latest" ]; then mode="latest"; else mode="tag"; target="$ver"; fi
        elif printf '%s' "$ACTION_REF" | grep -Eq '^v?[0-9]+$'; then
          # Moving major tag (e.g. 1 or v1): pick the newest release within that major.
          # gh lists newest-first, so the first <major>.* tag is the latest one.
          major="$ACTION_REF"
          # `// empty` so an empty match yields "" (not the string "null", which
          # would be non-empty and trigger a bogus `gh release download null`).
          # No `2>/dev/null`: gh is silent on the normal empty case, so let real
          # errors (rate limit, auth) surface; `|| true` still keeps the fallback.
          target="$(gh release list --repo "$repo" --exclude-drafts --exclude-pre-releases \
            --limit 100 --json tagName \
            --jq "[.[].tagName | select(test(\"^${major}\\\\.\"))][0] // empty" || true)"
          if [ -n "$target" ]; then
            mode="tag"
          else
            mode="none"
            echo "::warning::No published ${major}.* release found; building from source."
          fi
        elif printf '%s' "$ACTION_REF" | grep -Eq '^v?[0-9]+\.[0-9]'; then
          mode="tag"; target="$ACTION_REF"   # full release tag
        fi

        # Pick the release asset for this runner's OS/arch.
        os="$(uname -s)"
        arch="$(uname -m)"
        case "$os" in
          Darwin) asset="attest-macos-universal" ;;
          Linux)
            case "$arch" in
              x86_64|amd64) asset="attest-linux-x86_64" ;;
              *)            asset="" ;;
            esac
            ;;
          *) asset="" ;;
        esac

        tmp="$(mktemp -d)"
        bin=""

        download() {
          # Fetch $asset (+ sidecar) for the resolved release into $tmp. Returns
          # 0 only when the binary asset actually landed.
          rm -f "$tmp/$asset" "$tmp/$asset.sha256"
          if [ "$mode" = "latest" ]; then
            gh release download --repo "$repo" \
              --pattern "$asset" --pattern "$asset.sha256" \
              --dir "$tmp" --clobber 2>/dev/null || return 1
          else
            gh release download "$target" --repo "$repo" \
              --pattern "$asset" --pattern "$asset.sha256" \
              --dir "$tmp" --clobber 2>/dev/null || return 1
          fi
          [ -f "$tmp/$asset" ]
        }

        if [ -n "$asset" ] && [ "$mode" != "none" ]; then
          if download; then
            # Verify the checksum sidecar when present; a mismatch is fatal.
            if [ -f "$tmp/$asset.sha256" ]; then
              expected="$(cut -d' ' -f1 < "$tmp/$asset.sha256")"
              if command -v sha256sum >/dev/null 2>&1; then
                actual="$(sha256sum "$tmp/$asset" | cut -d' ' -f1)"
              else
                actual="$(shasum -a 256 "$tmp/$asset" | cut -d' ' -f1)"
              fi
              if [ "$expected" != "$actual" ]; then
                echo "::error::attest checksum mismatch for $asset (expected $expected, got $actual)."
                exit 1
              fi
              echo "Verified $asset against published sha256."
            else
              echo "::warning::No sha256 sidecar published for $asset; skipping checksum verification."
            fi
            chmod +x "$tmp/$asset"
            bin="$tmp/$asset"
            echo "Installed attest ($asset, ${target:-latest}) for $os/$arch."
          fi
        fi

        # Fallback: build from the action's OWN checkout (never the consumer's
        # tree) when no prebuilt binary fits this runner. Needs a Swift toolchain.
        if [ -z "$bin" ]; then
          if command -v swift >/dev/null 2>&1; then
            echo "::warning::No prebuilt attest for $os/$arch; building from source. Use a supported runner (macOS or Linux x86_64) to skip this."
            swift build -c release --package-path "$ACTION_PATH"
            # Ask SwiftPM for the bin dir rather than hardcoding .build/release
            # (mirrors release.yml; --show-bin-path only prints, never rebuilds).
            bindir="$(swift build -c release --package-path "$ACTION_PATH" --show-bin-path)"
            bin="$bindir/attest"
          else
            echo "::error::No prebuilt attest binary for $os/$arch and no Swift toolchain to build one. Use macOS or Linux x86_64 runners, or install Swift first."
            exit 1
          fi
        fi

        echo "binary=$bin" >> "$GITHUB_OUTPUT"

    - name: attest verify
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        ATTEST: ${{ steps.install.outputs.binary }}
        RANGE: ${{ inputs.range }}
        POLICY: ${{ inputs.policy }}
        FORWARD_FROM: ${{ inputs.forward-from }}
        FORWARD_TO: ${{ inputs.forward-to }}
        FORWARD_REVIEWER: ${{ inputs.forward-reviewer }}
        FORWARD_SIGN: ${{ inputs.forward-sign }}
      run: |
        set -euo pipefail
        if [ -n "$FORWARD_FROM" ]; then
          forward_args=(forward --from "$FORWARD_FROM" --to "$FORWARD_TO" --reviewer "$FORWARD_REVIEWER")
          if [ "$FORWARD_SIGN" = "true" ]; then
            forward_args+=(--sign)
          fi
          "$ATTEST" "${forward_args[@]}"
        fi
        "$ATTEST" verify --range "$RANGE" --policy "$POLICY"
