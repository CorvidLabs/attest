name: Deploy Site

# ─────────────────────────────────────────────────────────────────────────────
# HONEST CAVEAT — GitHub Pages on a PRIVATE repository.
#
# attest is currently a PRIVATE repo. Publishing GitHub Pages from a private
# repo to a PUBLIC URL (https://corvidlabs.github.io/attest/) requires a paid
# plan — GitHub Pro, Team, or Enterprise. On the free plan, Pages for a private
# repo is not served publicly and the `deploy` job will not surface the site.
#
# This workflow is therefore marketing PREP: it builds the Astro site on every
# push so the artifact is always ready, and is wired to deploy so that the
# moment the repo goes public (or onto a paid plan) publishing Just Works. To
# actually serve it, enable Pages in repo Settings → Pages → "GitHub Actions".
# We deliberately do NOT enable Pages via the API here.
#
# Runner: [self-hosted, macOS] — matches this project's policy (attest is
# macOS-only; CI already runs on the self-hosted macOS ARM64 runners). The
# build itself is platform-agnostic (Bun + Astro), but we keep the runner
# consistent with the rest of the repo.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Astro Site
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need history so attest can read HEAD

      # Produce a shields.io endpoint JSON reflecting attest's own provenance
      # status for HEAD, BEFORE the Astro build. Astro copies site/public/* to
      # the site root, so this is served at
      # https://corvidlabs.github.io/attest/badge.json and powers the live
      # README badge. Git notes are not shown in the GitHub UI; this badge (plus
      # the CI commit status) is how provenance surfaces in the browser.
      - name: Build attest (release)
        run: swift build -c release

      - name: Emit live provenance badge JSON
        run: |
          set -uo pipefail
          ATTEST=".build/release/attest"
          # Attestation records live in refs/notes/attest, which a plain
          # checkout does not fetch, so pull them so verify can see them.
          git fetch origin "refs/notes/*:refs/notes/*" || true
          "$ATTEST" verify --commit HEAD --policy .attest.json
          code=$?
          if [ "$code" = "0" ]; then
            MESSAGE="verified"
            COLOR="brightgreen"
          else
            MESSAGE="unverified"
            COLOR="red"
          fi
          echo "attest badge: $MESSAGE ($COLOR)"
          printf '{"schemaVersion":1,"label":"attest","message":"%s","color":"%s"}\n' \
            "$MESSAGE" "$COLOR" > site/public/badge.json
          cat site/public/badge.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: site
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: [self-hosted, macOS]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
