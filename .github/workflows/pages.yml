name: Deploy Site

# ─────────────────────────────────────────────────────────────────────────────
# HONEST CAVEAT — GitHub Pages on a PRIVATE repository.
#
# attest is currently a PRIVATE repo. Publishing GitHub Pages from a private
# repo to a PUBLIC URL (https://corvidlabs.github.io/attest/) requires a paid
# plan — GitHub Pro, Team, or Enterprise. On the free plan, Pages for a private
# repo is not served publicly and the `deploy` job will not surface the site.
#
# This workflow is therefore marketing PREP: it builds the Astro site on every
# push so the artifact is always ready, and is wired to deploy so that the
# moment the repo goes public (or onto a paid plan) publishing Just Works. To
# actually serve it, enable Pages in repo Settings → Pages → "GitHub Actions".
# We deliberately do NOT enable Pages via the API here.
#
# Runner: ubuntu-latest. The site build is pure Bun + Astro and does not need a
# Swift toolchain, so we no longer tie it to the self-hosted macOS runners.
# Decoupling means a docs/site push never waits on (or fails because of) the
# self-hosted box being offline.
#
# TRADEOFF - static badge.json instead of a live one. The old build ran the
# attest CLI (which needs Swift, hence macOS) to emit a live provenance badge
# reflecting HEAD's verification status. Moving to ubuntu-latest, we instead
# ship a committed, stable site/public/badge.json. The README shields.io badge
# endpoint still resolves and stays green; it just no longer recomputes
# verification on every site deploy. Provenance is still verified for real by
# the attest CI workflow (ci.yml) and the commit status it sets.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
      - 'CHANGELOG.md'   # the header version badge reads from here, so rebuild on release
      - 'Sources/**'     # atlas spec-coverage badge tracks the source tree
      - 'specs/**'       # ...and the specs that govern it
      - '.atlasignore'   # ...and the coverage scope
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # the header reads the version from CHANGELOG.md at build time

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      # Cache the compiled fledge-atlas CLI so the badge step is a fast no-op on a
      # cache hit instead of a ~3-5 min cargo build. Keyed to the exact commit the
      # `v1` tag resolves to, so moving v1 invalidates the cache automatically and
      # the next run rebuilds + re-caches. On a hit, cargo install sees the binary
      # already installed at that commit and skips the build.
      - name: Resolve pinned atlas commit (cache key)
        id: atlasref
        run: echo "sha=$(git ls-remote https://github.com/CorvidLabs/fledge-plugin-atlas v1 | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache the fledge-atlas CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/fledge-atlas
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: fledge-atlas-${{ runner.os }}-${{ steps.atlasref.outputs.sha }}

      # Render attest's own spec-coverage badges + SVG cards from the atlas, into
      # site/public/badges so the Astro build copies them into the deployed site
      # (served at corvidlabs.github.io/attest/badges/). .atlasignore scopes the
      # coverage to the library Sources.
      - name: Render atlas coverage badges
        uses: CorvidLabs/fledge-plugin-atlas@v1
        with:
          path: .
          output-dir: site/public/badges
          components: "coverage langmix treemap sunburst"

      - name: Build site
        working-directory: site
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # GitHub Pages' backend occasionally returns a transient "Deployment failed,
      # try again later" during the status check. Attempt once, then retry once so
      # a flake does not leave the badges stale until the next push.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to GitHub Pages (retry transient failures)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
