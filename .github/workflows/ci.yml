name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  build-test:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
      - run: swift build
      - run: swift test
      - run: fledge spec check
      - name: Dogfood attest verify (non-fatal)
        run: |
          echo "Dogfooding attest against its own latest commit."
          echo "The repo may carry no attestations yet, so this step is informative, not gating."
          swift run attest verify --range HEAD~1..HEAD --policy .attest.json || true
