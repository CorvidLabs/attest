name: CI
on:
  push: { branches: [main] }
  pull_request:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  build-test:
    # GitHub-hosted, ephemeral runner. Never use self-hosted runners on a public
    # repo: a pull_request from a fork would run untrusted code on the host.
    runs-on: macos-latest
    # contents: write lets the dogfood step push the growing provenance ledger
    # to refs/notes/attest on pushes to main (no-op on PRs — see the step below).
    # statuses: write lets the step below post a GitHub commit status named
    # "attest" so provenance surfaces as a check on the commit and PR pages
    # (git notes themselves are not shown in the GitHub web UI).
    permissions:
      contents: write
      statuses: write
    steps:
      # fetch-depth: 0 so the PR head commit is present locally on pull_request
      # events (checkout defaults to a shallow merge ref). attest sign validates
      # the target commit exists, so the head SHA it attests must be fetched.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install fledge
        run: brew install corvidlabs/tap/fledge
      - run: swift build
      - run: swift test
      - run: fledge spec check

      # --- Dogfood: attest records signed provenance on its OWN CI commit. ---
      # After build + test pass, attest attests this very commit, then gates it
      # against the committed .attest.json policy. The .attest.json policy is
      # permissive (it only requires an attestation), so this verify is a REAL,
      # fatal gate that passes precisely because we just recorded an attestation.
      - name: Build attest (release)
        run: swift build -c release

      - name: Dogfood — attest attests this CI commit
        env:
          # Use the same SHA the verify step and commit status use: the PR head
          # on a pull_request, the pushed SHA otherwise. Signing the merge SHA on
          # a PR would leave the verified head un-attested.
          ATTEST_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          ATTEST=".build/release/attest"
          # Fetch the existing ledger so the new attestation appends to it and the
          # later push is a fast-forward. A plain checkout does not fetch notes,
          # so without this the push is rejected as non-fast-forward.
          git fetch origin "+refs/notes/attest:refs/notes/attest" 2>/dev/null || true
          echo "attest is attesting its own CI commit $ATTEST_SHA"
          # Record an agent:ci attestation on the commit under test. Signing in
          # CI is optional (no key is provisioned) — an unsigned attestation is a
          # valid record, which is the whole point of attest.
          "$ATTEST" sign \
            --commit "$ATTEST_SHA" \
            --reviewer "agent:ci" \
            --confidence 0.9 \
            --tests-passed \
            --verdict proceed \
            --note "CI: swift build + swift test + fledge spec check all green"

      - name: Dogfood — verify the CI commit against .attest.json (fatal gate)
        id: verify
        env:
          # The PR head SHA on a pull_request event, the pushed SHA otherwise.
          # This is the SHA the commit status is attached to below.
          ATTEST_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -uo pipefail
          ATTEST=".build/release/attest"
          echo "== ledger for $ATTEST_SHA =="
          "$ATTEST" log --commit "$ATTEST_SHA" --color always
          echo "== verify against the committed policy (fatal) =="
          # The committed .attest.json is permissive enough that the attestation
          # we just recorded satisfies it. We capture the exit code so the next
          # step can publish a commit status, then re-raise it so a real policy
          # violation still fails the job.
          "$ATTEST" verify --commit "$ATTEST_SHA" --policy .attest.json --color always
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      # Surface provenance in the GitHub web UI. Git notes (refs/notes/attest)
      # are NOT shown in the GitHub UI, so we publish a commit status named
      # "attest" that appears as a check on the commit and PR pages. This runs
      # even when verify fails (so a failure is reported), and is best-effort so
      # a token hiccup can never redden CI on its own.
      - name: Post attest commit status
        if: always() && steps.verify.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
          ATTEST_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          VERIFY_CODE: ${{ steps.verify.outputs.exit_code }}
        run: |
          set -uo pipefail
          if [ "${VERIFY_CODE:-1}" = "0" ]; then
            STATE="success"
            DESC="provenance verified"
          else
            STATE="failure"
            DESC="policy not satisfied"
          fi
          echo "posting attest commit status: $STATE ($DESC) on $ATTEST_SHA"
          gh api -X POST "repos/${{ github.repository }}/statuses/$ATTEST_SHA" \
            -f state="$STATE" \
            -f context="attest" \
            -f description="$DESC" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "status post skipped"

      # PREFERRED real dogfooding: push the notes ref so attest's repo
      # accumulates a provenance ledger over time. Guarded to push only on a
      # push to main (never on PRs, which run from forks/branches and lack the
      # write token reliably). The push is best-effort: a permissions or race
      # issue prints a notice instead of reddening CI, so the gate above remains
      # the only thing that can fail this job.
      - name: Dogfood — push the provenance ledger (main only, best-effort)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -uo pipefail
          echo "pushing refs/notes/attest so the ledger travels with the repo"
          git push origin refs/notes/attest || echo "note push skipped (perms/race) — ledger recorded locally for this run"
